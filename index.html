<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
  <head>
    <!-- ══ PROJECT MEMORY · do not delete ════════════════════════════
    brand    : ميزان (Mizan) — Islamic productivity around the 5 prayers
    lang     : ar primary (rtl) · en secondary · lang/dir synced by AppContext
    palette  : "Crimson Dawn" — crimson-carrot only, LIGHT ONLY (no toggle):
               bg 50 #ffece6 · surface 100 #fedacd · border 200 #fdb59b ·
               text 900/#320e01 + 700/#972a02 · CTA 500 #fb4604 hover 600
    fonts    : wordmark + AR h1–h3 = Palestine · AR body/UI = Al Jazeera
               (300/400/700) — all subset woff2 via scripts/subset-fonts.mjs
               (harfbuzz keeps GSUB/GPOS = Arabic joining) · EN display =
               Noto Serif · EN UI = Inter · Quran = Amiri
    theme    : light ONLY — boot script pins it; AppContext theme is inert
    logo     : concept B "محراب التوازن" (hand-crafted SVG, mihrab + scale) in
               src/components/MizanMark.jsx · stroke-draw 900ms → pan-swing
               spring → wordmark RTL clip-wipe · click = home + press-pop
    effects  : hero = CSS layered crimson gradients (.crimson-hero-bg + 3
               drift blobs 40/50/35s) — NO WebGL on landing
    legacy   : old token names (--mizan-*, --gold, --accent-purple…) bridged to
               semantic tokens in globals.css — dashboard reskins via bridge
    decisions: 2026-06-13 client picked logo B + crimson-carrot light-only ·
               الشروق removed from prayer list · الضحى info-only · DayHistory
               → annual calendar · emojis → Icon3D set
    ═══════════════════════════════════════════════════════════════ -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/mizan-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffece6" />
    <title>ميزان — Mizan | Productivity Around the Five Prayers</title>
    <meta name="description" content="ميزان — Islamic productivity built around the five daily prayers: salah tracking, morning and evening adhkar, Quran reading and deep-work focus, with a streak that holds." />
    <meta property="og:title" content="ميزان — Mizan" />
    <meta property="og:description" content="A day built around the five prayers — salah, adhkar, Quran and deep work." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mizan" />
    <meta name="twitter:card" content="summary" />

    <!-- Language boot: runs before CSS so there is no wrong-direction flash.
         Theme is pinned light (the only theme). -->
    <script>
      (function () {
        var l = 'ar';
        try { l = localStorage.getItem('mizan.lang') || 'ar'; } catch (e) {}
        var d = document.documentElement;
        d.dataset.theme = 'light';
        d.setAttribute('lang', l === 'en' ? 'en' : 'ar');
        d.setAttribute('dir', l === 'en' ? 'ltr' : 'rtl');
      })();
    </script>

    <!-- Brand fonts — subset woff2 (59KB total), raw files kept as fallback -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/palestine.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/aljazeera-regular.woff2" crossorigin />
    <style>
      @font-face {
        font-family: 'Palestine';
        src: url('/fonts/palestine.woff2') format('woff2'),
             url('/fonts/palestine.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        unicode-range: U+0600-06FF, U+0750-077F, U+FB50-FDFF, U+FE70-FEFF, U+0660-0669, U+060C, U+061B, U+061F;
      }
      @font-face {
        font-family: 'Al Jazeera';
        src: url('/fonts/aljazeera-light.woff2') format('woff2'),
             url('/fonts/aljazeera-light.ttf') format('truetype');
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Al Jazeera';
        src: url('/fonts/aljazeera-regular.woff2') format('woff2'),
             url('/fonts/aljazeera-regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Al Jazeera';
        src: url('/fonts/aljazeera-bold.woff2') format('woff2'),
             url('/fonts/aljazeera-bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@500;600;700&family=Amiri:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
